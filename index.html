<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1a2451" />
<meta name="description" content="Aleksander's Riddle Quest — solve magical riddles and climb the leaderboard!" />
<title>Aleksander's Riddle Quest! 🧩</title>
<link rel="icon" type="image/x-icon" href="favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="manifest" href="site.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>🧩 Aleksander's Riddle Quest! 🎉</h1>
  <img src="logo.png" alt="Aleksander's Riddle Quest logo" class="logo" />
  <div class="subtitle">Can you solve all the riddles? Let's find out! ✨</div>
  <div class="scoreboard">
    <div class="score-pill correct">😊 Correct: <span id="score-correct">0</span></div>
    <div class="score-pill wrong">😢 Wrong: <span id="score-wrong">0</span></div>
    <div class="score-pill total">🎯 Riddle: <span id="score-total">1</span> / <span id="score-max">0</span></div>
  </div>
</header>

<div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>

<div class="card" id="card">
  <div id="game-view">
    <span class="riddle-num" id="riddle-num">Riddle #1</span>
    <div class="riddle-text" id="riddle-text">Loading...</div>
    <div class="answer-row">
      <input type="text" id="answer-input" placeholder="Type your answer here..." autocomplete="off" />
      <button id="submit-btn">Check! 🔍</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="controls" id="controls"></div>
  </div>
</div>

<footer>Made with 💖 for curious student Aleks</footer>

<script src="game.js"></script>
</body>
</html>
